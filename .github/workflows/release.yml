name: ArkGram Release Builds

run-name: ArkGram Release Builds · ${{ github.ref_name }} · @${{ github.actor }} · #${{ github.run_number }}

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    runs-on: ubuntu-latest
    env:
      ORG_GRADLE_PROJECT_RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
      ORG_GRADLE_PROJECT_RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Java
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.1.0
        with:
          cache-cleanup: always
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          cache-read-only: ${{ github.ref != 'refs/heads/master' && !startsWith(github.ref, 'refs/tags/') }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4.0.1
        with:
          packages: 'platforms;android-36 build-tools;36.0.0 ndk;21.4.7075529 cmake;3.22.1'

      - name: Prepare local.properties
        shell: bash
        run: |
          sdk_root="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          printf 'sdk.dir=%s\n' "$sdk_root" > local.properties

      - name: Compute CI version
        shell: bash
        run: |
          tag_name="${GITHUB_REF_NAME#v}"
          echo "ORG_GRADLE_PROJECT_APP_VERSION_CODE=$((6666 + GITHUB_RUN_NUMBER))" >> "$GITHUB_ENV"
          echo "ORG_GRADLE_PROJECT_APP_VERSION_NAME=${tag_name}" >> "$GITHUB_ENV"

      - name: Validate signing inputs
        shell: bash
        run: |
          test -n "${ORG_GRADLE_PROJECT_RELEASE_KEY_PASSWORD}"
          test -n "${ORG_GRADLE_PROJECT_RELEASE_STORE_PASSWORD}"
          test -n "${ORG_GRADLE_PROJECT_APP_VERSION_CODE}"
          test -f TMessagesProj/config/release.keystore

      - name: Resolve release key alias
        shell: bash
        run: |
          release_alias="$(keytool -list -keystore TMessagesProj/config/release.keystore -storepass "${ORG_GRADLE_PROJECT_RELEASE_STORE_PASSWORD}" | awk -F, '/PrivateKeyEntry/ {print $1; exit}')"
          test -n "${release_alias}"
          echo "ORG_GRADLE_PROJECT_RELEASE_KEY_ALIAS=${release_alias}" >> "$GITHUB_ENV"

      - name: Build release APKs and AABs
        shell: bash
        run: |
          chmod +x gradlew
          ./gradlew \
            :TMessagesProj_App:assembleAfatRelease \
            :TMessagesProj_App:bundleBundleAfatRelease \
            :TMessagesProj_AppStandalone:assembleAfatStandalone \
            :TMessagesProj_AppStandalone:bundleAfatStandalone \
            --build-cache --configuration-cache --stacktrace

      - name: Publish GitHub release binaries
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ github.ref_name }}
          target_commitish: ${{ github.sha }}
          fail_on_unmatched_files: true
          files: |
            TMessagesProj_App/build/outputs/apk/afat/release/*.apk
            TMessagesProj_App/build/outputs/bundle/bundleAfatRelease/*.aab
            TMessagesProj_AppStandalone/build/outputs/apk/afat/standalone/*.apk
            TMessagesProj_AppStandalone/build/outputs/bundle/afatStandalone/*.aab
          generate_release_notes: true
