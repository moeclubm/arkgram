name: release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    runs-on: ubuntu-latest
    env:
      ORG_GRADLE_PROJECT_RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
      ORG_GRADLE_PROJECT_RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android components
        shell: bash
        run: |
          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          set -o pipefail
          sdkmanager --install \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;21.4.7075529" \
            "cmake;3.10.2.4988404"

      - name: Prepare local.properties
        shell: bash
        run: |
          sdk_root="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          printf 'sdk.dir=%s\n' "$sdk_root" > local.properties

      - name: Compute CI version
        shell: bash
        run: |
          tag_name="${GITHUB_REF_NAME#v}"
          echo "ORG_GRADLE_PROJECT_APP_VERSION_CODE=$((6666 + GITHUB_RUN_NUMBER))" >> "$GITHUB_ENV"
          echo "ORG_GRADLE_PROJECT_APP_VERSION_NAME=${tag_name}" >> "$GITHUB_ENV"

      - name: Validate signing inputs
        shell: bash
        run: |
          test -n "${ORG_GRADLE_PROJECT_RELEASE_KEY_PASSWORD}"
          test -n "${ORG_GRADLE_PROJECT_RELEASE_STORE_PASSWORD}"
          test -n "${ORG_GRADLE_PROJECT_APP_VERSION_CODE}"
          test -f TMessagesProj/config/release.keystore

      - name: Build release APK
        shell: bash
        run: |
          chmod +x gradlew
          ./gradlew :TMessagesProj_App:assembleAfatRelease --stacktrace

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flexgram-release-${{ github.ref_name }}
          path: TMessagesProj_App/build/outputs/apk/**/*.apk
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: TMessagesProj_App/build/outputs/apk/**/*.apk
          generate_release_notes: true
