name: Beta

run-name: Beta · ${{ github.ref_name }} · @${{ github.actor }} · #${{ github.run_number }}

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: beta-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-beta:
    runs-on: ubuntu-latest
    env:
      ORG_GRADLE_PROJECT_CI_ABI_FILTERS: arm64-v8a
      ORG_GRADLE_PROJECT_RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
      ORG_GRADLE_PROJECT_RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: always
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          cache-read-only: ${{ github.ref != 'refs/heads/master' && !startsWith(github.ref, 'refs/tags/') }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'platforms;android-36 build-tools;36.0.0 ndk;21.4.7075529 cmake;3.22.1'

      - name: Prepare local.properties
        shell: bash
        run: |
          sdk_root="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          printf 'sdk.dir=%s\n' "$sdk_root" > local.properties

      - name: Compute CI version
        shell: bash
        run: |
          echo "ORG_GRADLE_PROJECT_APP_VERSION_CODE=$((6666 + GITHUB_RUN_NUMBER))" >> "$GITHUB_ENV"
          echo "ORG_GRADLE_PROJECT_APP_VERSION_NAME=12.6.4-beta.${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Validate signing inputs
        shell: bash
        run: |
          test -n "${ORG_GRADLE_PROJECT_RELEASE_KEY_PASSWORD}"
          test -n "${ORG_GRADLE_PROJECT_RELEASE_STORE_PASSWORD}"
          test -n "${ORG_GRADLE_PROJECT_APP_VERSION_CODE}"
          test -f TMessagesProj/config/release.keystore

      - name: Build beta artifacts
        shell: bash
        run: |
          chmod +x gradlew
          ./gradlew :TMessagesProj_App:assembleAfatDebug :TMessagesProj_App:bundleAfatRelease --build-cache --configuration-cache --stacktrace

      - name: Upload beta debug APK
        uses: actions/upload-artifact@v6
        with:
          name: flexgram-beta-debug-${{ github.sha }}
          path: TMessagesProj_App/build/outputs/apk/afat/debug/*.apk
          if-no-files-found: error

      - name: Upload beta release AAB
        uses: actions/upload-artifact@v6
        with:
          name: flexgram-beta-aab-${{ github.sha }}
          path: |
            TMessagesProj_App/build/outputs/bundle/bundleAfatRelease/*.aab
            TMessagesProj_App/build/outputs/bundle/bundleAfatRelease/output-metadata.json
          if-no-files-found: error
