name: ArkGram Beta Builds

run-name: ArkGram Beta Builds · ${{ github.ref_name }} · @${{ github.actor }} · #${{ github.run_number }}

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: beta-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-beta:
    runs-on: ubuntu-latest
    env:
      ORG_GRADLE_PROJECT_CI_ABI_FILTERS: arm64-v8a
      ORG_GRADLE_PROJECT_RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
      ORG_GRADLE_PROJECT_RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Java
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.1.0
        with:
          cache-cleanup: always
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          cache-read-only: ${{ github.ref != 'refs/heads/master' && !startsWith(github.ref, 'refs/tags/') }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4.0.1
        with:
          packages: 'platforms;android-36 build-tools;36.0.0 ndk;21.4.7075529 cmake;3.22.1'

      - name: Prepare local.properties
        shell: bash
        run: |
          sdk_root="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          printf 'sdk.dir=%s\n' "$sdk_root" > local.properties

      - name: Compute CI version
        shell: bash
        run: |
          base_version="$(sed -n 's/^APP_VERSION_NAME=//p' gradle.properties)"
          echo "ORG_GRADLE_PROJECT_APP_VERSION_CODE=$((6666 + GITHUB_RUN_NUMBER))" >> "$GITHUB_ENV"
          echo "ORG_GRADLE_PROJECT_APP_VERSION_NAME=${base_version}-beta.${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Validate signing inputs
        shell: bash
        run: |
          test -n "${ORG_GRADLE_PROJECT_RELEASE_KEY_PASSWORD}"
          test -n "${ORG_GRADLE_PROJECT_RELEASE_STORE_PASSWORD}"
          test -n "${ORG_GRADLE_PROJECT_APP_VERSION_CODE}"
          test -f TMessagesProj/config/release.keystore

      - name: Resolve release key alias
        shell: bash
        run: |
          release_alias="$(keytool -list -keystore TMessagesProj/config/release.keystore -storepass "${ORG_GRADLE_PROJECT_RELEASE_STORE_PASSWORD}" | awk -F, '/PrivateKeyEntry/ {print $1; exit}')"
          test -n "${release_alias}"
          echo "ORG_GRADLE_PROJECT_RELEASE_KEY_ALIAS=${release_alias}" >> "$GITHUB_ENV"

      - name: Build beta APKs and AABs
        shell: bash
        run: |
          chmod +x gradlew
          ./gradlew \
            :TMessagesProj_App:assembleAfatBeta \
            :TMessagesProj_App:bundleBundleAfatBeta \
            :TMessagesProj_AppStandalone:assembleAfatStandalone \
            :TMessagesProj_AppStandalone:bundleAfatStandalone \
            --build-cache --configuration-cache --stacktrace

      - name: Publish beta binaries
        if: github.ref == 'refs/heads/master'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          assets=(
            TMessagesProj_App/build/outputs/apk/afat/beta/*.apk
            TMessagesProj_App/build/outputs/bundle/bundleAfatBeta/*.aab
            TMessagesProj_AppStandalone/build/outputs/apk/afat/standalone/*.apk
            TMessagesProj_AppStandalone/build/outputs/bundle/afatStandalone/*.aab
          )
          for asset in "${assets[@]}"; do
            test -f "$asset"
          done
          if gh release view beta >/dev/null 2>&1; then
            gh release delete beta --yes --cleanup-tag
          fi
          gh release create beta "${assets[@]}" \
            --target "$GITHUB_SHA" \
            --title "ArkGram Beta #${GITHUB_RUN_NUMBER}" \
            --notes "Commit ${GITHUB_SHA}" \
            --prerelease \
            --latest=false
